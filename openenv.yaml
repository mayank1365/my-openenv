spec_version: "1.0"
name: data-pipeline-repair
type: environment
runtime: python3.11
app: server.app:app
port: 7860
version: "1.0.0"
description: >
  An OpenEnv environment where an LLM/RL agent diagnoses and repairs broken
  ETL pipeline configurations. The agent iteratively patches a pipeline config
  JSON and validates output against expected rows using a real Python executor.

observation_space:
  type: dict
  fields:
    pipeline_name:          {type: str}
    pipeline_config:        {type: object, description: "Current pipeline config with steps array"}
    error_log:              {type: str,    description: "Python exception from last run, or empty string"}
    input_schema:           {type: object, description: "columns and types of input data"}
    expected_output_schema: {type: object, description: "columns and types of expected output"}
    sample_input_rows:      {type: array,  description: "List of input row dicts"}
    current_output_rows:    {type: array,  description: "Output rows from current config"}
    comparison:             {type: object, description: "row_match, schema_match, count_match"}
    fix_attempts:           {type: array,  description: "History of patches and their results"}
    step_number:            {type: int}

action_space:
  type: dict
  fields:
    diagnosis:
      type: str
      description: "Agent's hypothesis about the root cause of the bug"
      required: false
    patch:
      type: object
      required: false
      fields:
        step_index: {type: int,    description: "0-indexed step in pipeline_config.steps"}
        field:      {type: str,    description: "Config field to update"}
        old_value:  {type: any,    required: false}
        new_value:  {type: any,    description: "Replacement value"}
    validate_only:
      type: bool
      default: false
      description: "If true, run pipeline without applying a patch"

reward:
  type: float
  range: [-0.20, 1.0]

tasks:
  - id: easy
    description: "Type Cast Failure: Pipeline crashes on invalid date strings. Patch null_handling to coerce."
    max_steps: 4
    success_threshold: 0.90

  - id: medium
    description: "Silent Schema Mismatch: Aggregation produces wrong column names. Add explicit output_name mappings."
    max_steps: 6
    success_threshold: 0.90

  - id: hard
    description: "Silent Bugs: Multi-step errors. Fix wrong deduplication key and silent date cast drops."
    max_steps: 8
    success_threshold: 0.95

endpoints:
  reset: {method: POST, path: /reset}
  step:  {method: POST, path: /step}
  state: {method: GET,  path: /state}
